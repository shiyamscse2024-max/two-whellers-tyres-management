{% extends "base.html" %}

{% block content %}



<h1>Price History</h1>

<table border="1">

<tr>
    <th>Date</th>
    <th>Old Price</th>
    <th>New Price</th>
</tr>

{% for row in history %}

<tr>

<td>{{ row[4] }}</td>
<td>₹{{ row[2] }}</td>
<td>₹{{ row[3] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
