{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow p-4 invoice-card">
      <div class="text-center mb-4">
        <h2 class="fw-bold">SARAVANA AUTO PARTS</h2>
        <p class="mb-0">Tyre Shop Billing</p>
      </div>

      <div class="mb-3">
        <p><strong>Customer:</strong> {{ sale[1] }}</p>
        <p><strong>Vehicle:</strong> {{ sale[2] }}</p>
        <p><strong>Date:</strong> {{ sale[8] }}</p>
      </div>

      <hr>

      <div class="d-flex justify-content-between">
        <span>Front Tyre</span>
        <span>{{ sale[3] }} x {{ sale[5] }}</span>
      </div>
      <div class="d-flex justify-content-between">
        <span>Rear Tyre</span>
        <span>{{ sale[4] }} x {{ sale[6] }}</span>
      </div>

      <hr>
      <div class="d-flex justify-content-between fw-bold fs-5">
        <span>Total</span>
        <span>₹{{ sale[7] }}</span>
      </div>

      <div class="text-center mt-4">
        <a href="{{ url_for('invoice_pdf', sale_id=sale[0]) }}" class="btn btn-primary me-2">Download PDF</a>
        <button class="btn btn-outline-primary" onclick="window.print()">Print Invoice</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
